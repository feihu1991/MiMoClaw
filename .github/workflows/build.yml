name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          ./gradlew assembleDebug --console=plain > gradle-debug.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Relevant Gradle errors"
            grep -E -C 3 '(^e: |error:|Unresolved reference|Compilation error|Execution failed for task|FAILURE:|What went wrong:)' gradle-debug.log || true
            echo "::endgroup::"
            echo "::group::Gradle log tail"
            tail -n 100 gradle-debug.log
            echo "::endgroup::"
            exit "$status"
          fi
          tail -n 30 gradle-debug.log

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mimo-claw-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: mimo-claw-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
